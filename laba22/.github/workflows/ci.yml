name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  JAVA_VERSION: '17'

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Дать права на mvnw
        run: chmod +x laba22/mvnw

      - name: Компиляция, тестирование и упаковка
        run: |
          cd laba22
          ./mvnw -B clean package

      - name: Загрузить JAR как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: laba22-jar
          path: laba22/target/*.jar
          retention-days: 30